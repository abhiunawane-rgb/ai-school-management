name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-firebase:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @ai-school/shared build
      - run: pnpm --filter @ai-school/functions build
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: npm install -g firebase-tools
      - run: firebase deploy --only firestore:rules,firestore:indexes,functions --project ${{ secrets.FIREBASE_PROJECT_ID }}

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: deploy-firebase
    strategy:
      matrix:
        app: [admin, marketing]
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ matrix.app == 'admin' && secrets.VERCEL_ADMIN_PROJECT_ID || secrets.VERCEL_MARKETING_PROJECT_ID }}
          working-directory: apps/${{ matrix.app }}

  deploy-railway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bervProject/railway-deploy@v1.0.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ai-school-ai
          path: services/ai
